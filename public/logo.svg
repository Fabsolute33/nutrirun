<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fond arrondi vert -->
  <rect width="100" height="100" rx="22" fill="#16A34A"/>

  <!-- Coureur stylisé -->
  <!-- Tête -->
  <circle cx="62" cy="22" r="7" fill="white"/>
  <!-- Corps -->
  <line x1="62" y1="29" x2="55" y2="52" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Bras gauche (vers l'avant) -->
  <line x1="58" y1="38" x2="42" y2="32" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bras droit (vers l'arrière) -->
  <line x1="58" y1="38" x2="70" y2="48" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Jambe gauche (en avant) -->
  <line x1="55" y1="52" x2="40" y2="68" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="40" y1="68" x2="30" y2="60" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Jambe droite (en arrière) -->
  <line x1="55" y1="52" x2="68" y2="65" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="68" y1="65" x2="78" y2="72" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Petite feuille / nutrition en haut à gauche -->
  <ellipse cx="28" cy="26" rx="10" ry="6" fill="#BBF7D0" transform="rotate(-35 28 26)"/>
  <line x1="28" y1="26" x2="22" y2="34" stroke="#BBF7D0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
